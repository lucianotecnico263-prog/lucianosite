<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin — Luciano Editor</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-badge" aria-hidden="true"><span>LE</span></div>
        <div class="brand-copy">
          <strong>Luciano Editor</strong>
          <small>Painel administrativo</small>
        </div>
      </div>

      <div class="sidebar-profile">
        <img src="../assets/img/luciano-photo.jpg" alt="Luciano" class="sidebar-avatar">
        <div>
          <strong>Seu est&uacute;dio</strong>
          <span>Gerencie o conte&uacute;do</span>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Navega&ccedil;&atilde;o do painel">
        <div class="sidebar-section-title">Vis&atilde;o geral</div>
        <button class="nav-link active" data-route="dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>Dashboard</button>

        <div class="sidebar-section-title">Conte&uacute;do</div>
        <button class="nav-link" data-route="siteContent"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M8 9h8M8 13h6"/></svg></span>Conte&uacute;do do site</button>
        <button class="nav-link" data-route="posts"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M5 3h10l4 4v14H5z"/><path d="M15 3v5h5M8 13h8M8 17h6"/></svg></span>Publica&ccedil;&otilde;es</button>
        <button class="nav-link" data-route="categories"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 13.5 12.5 21 3 11.5V3h8.5z"/><circle cx="8" cy="8" r="1"/></svg></span>Categorias</button>
        <button class="nav-link" data-route="services"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19h16M6 16V9M12 16V5M18 16v-7"/></svg></span>Servi&ccedil;os</button>
        <button class="nav-link" data-route="portfolios"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m4 17 5-5 3 3 3-3 5 5"/></svg></span>Portf&oacute;lio</button>
        <button class="nav-link" data-route="testimonials"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M5 5h14v10H9l-4 4z"/><path d="M8 9h8"/></svg></span>Depoimentos</button>
        <button class="nav-link" data-route="faqs"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 4.4 1.6c-1.3 1.2-1.9 1.5-1.9 3M12 17h.01"/></svg></span>Perguntas frequentes</button>
        <button class="nav-link" data-route="media"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9" r="1.5"/><path d="m4 18 5-5 3 3 3-3 5 5"/></svg></span>Biblioteca de m&iacute;dia</button>

        <div class="sidebar-section-title">Gest&atilde;o</div>
        <button class="nav-link" data-route="messages"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 5h16v11H8l-4 4z"/><path d="m7 9 5 3 5-3"/></svg></span>Mensagens</button>
        <button class="nav-link" data-route="users"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c.8-4 3.4-6 8-6s7.2 2 8 6"/></svg></span>Usu&aacute;rios</button>
        <button class="nav-link" data-route="logs"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M5 3h14v18H5z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></span>Registros</button>
        <button class="nav-link" data-route="settings"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="m19.4 15 .1 2.1-2.1.9-1.3 2-2.1-.5-2.1.5-1.3-2-2.1-.9.1-2.1-1.3-1.7 1.3-1.7-.1-2.1 2.1-.9 1.3-2 2.1.5 2.1-.5 1.3 2 2.1.9-.1 2.1 1.3 1.7z"/></svg></span>Configura&ccedil;&otilde;es</button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-link nav-link-utility" id="refresh-btn"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 0 0-14-4L4 9"/><path d="M4 4v5h5M4 13a8 8 0 0 0 14 4l2-2"/><path d="M20 20v-5h-5"/></svg></span>Atualizar</button>
        <button class="nav-link nav-link-danger" id="logout-btn"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 4H5v16h5"/><path d="m14 8 4 4-4 4M8 12h10"/></svg></span>Sair</button>
      </div>
    </aside>

    <main class="main-area">
      <div class="topbar">
        <div>
          <h1 class="page-title">Painel Administrativo</h1>
          <p class="page-subtitle">CMS protegido por autenticação e permissões do Supabase.</p>
        </div>
        <div class="topbar-actions">
          <span class="badge badge-published">Online</span>
        </div>
      </div>

      <div id="admin-view"></div>
    </main>
  </div>

  <div id="toast-stack" class="toast-stack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="services/posts.js"></script>
  <script src="services/categories.js"></script>
  <script src="services/media.js"></script>
  <script src="services/messages.js"></script>
  <script src="services/logs.js"></script>
  <script src="services/settings.js"></script>
  <script src="services/cms.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/posts.js"></script>
  <script src="pages/categories.js"></script>
  <script src="pages/media.js"></script>
  <script src="pages/messages.js"></script>
  <script src="pages/users.js"></script>
  <script src="pages/logs.js"></script>
  <script src="pages/settings.js"></script>
  <script src="pages/cms.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
