<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin — Luciano Editor</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">⚙️</div>
        <div>
          <div>Luciano Admin</div>
          <small style="color: var(--muted);">CMS</small>
        </div>
      </div>

      <div class="sidebar-section-title">Navegação</div>
      <button class="nav-link active" data-route="dashboard">📊 Dashboard</button>
      <button class="nav-link" data-route="posts">📝 Publicações</button>
      <button class="nav-link" data-route="categories">🏷️ Categorias</button>
      <button class="nav-link" data-route="media">🖼️ Mídia</button>
      <button class="nav-link" data-route="messages">💬 Mensagens</button>
      <button class="nav-link" data-route="users">👤 Usuários</button>
      <button class="nav-link" data-route="logs">📜 Logs</button>
      <button class="nav-link" data-route="settings">⚙️ Configurações</button>

      <div class="sidebar-section-title">Ações</div>
      <button class="nav-link" id="logout-btn">🚪 Sair</button>
    </aside>

    <main class="main-area">
      <div class="topbar">
        <div>
          <h1 class="page-title">Painel Administrativo</h1>
          <p class="page-subtitle">CMS protegido por autenticação e permissões do Supabase.</p>
        </div>
        <div class="topbar-actions">
          <span class="badge badge-published">Online</span>
        </div>
      </div>

      <div id="admin-view"></div>
    </main>
  </div>

  <div id="toast-stack" class="toast-stack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="services/posts.js"></script>
  <script src="services/categories.js"></script>
  <script src="services/media.js"></script>
  <script src="services/messages.js"></script>
  <script src="services/logs.js"></script>
  <script src="services/settings.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/posts.js"></script>
  <script src="pages/categories.js"></script>
  <script src="pages/media.js"></script>
  <script src="pages/messages.js"></script>
  <script src="pages/users.js"></script>
  <script src="pages/logs.js"></script>
  <script src="pages/settings.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
