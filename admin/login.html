<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Admin | Luciano Editor</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body style="min-height:100vh;display:grid;place-items:center;padding:24px;">
  <div class="panel" style="width:min(420px,100%);padding:24px;">
    <div style="text-align:center;margin-bottom:18px;">
      <div class="brand-badge" style="margin:0 auto 12px;">🔐</div>
      <h1 class="page-title" style="margin-bottom:8px;">Luciano Admin</h1>
      <p class="page-subtitle">Entre para gerenciar o CMS do site.</p>
    </div>

    <form id="form-login" class="form-grid" novalidate>
      <div class="form-field">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="username">
      </div>
      <div class="form-field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Sua senha" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Entrar</button>
      <div id="login-error" class="toast error" style="display:none;"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
