<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Luciano Editor</title>
  <meta name="description" content="Artigos sobre edição de vídeo, storytelling, marketing digital e estratégia de conteúdo audiovisual.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<!-- ── PAGE HERO ──────────────────────────────────────────────── -->
<section class="page-hero">
  <div class="container">
    <div style="text-align:center;max-width:680px;margin:0 auto" class="animate-fade-up">
      <span class="badge badge-blue" style="margin-bottom:16px">📖 Blog</span>
      <h1 class="display-lg" style="margin-bottom:16px">Conteúdo que <span class="gradient-text">educa e inspira</span></h1>
      <p class="body-lg">Artigos sobre edição de vídeo, storytelling, marketing digital, algoritmos e estratégia de conteúdo audiovisual.</p>
    </div>
  </div>
</section>

<!-- ── BLOG ───────────────────────────────────────────────────── -->
<section class="section">
  <div class="container">

    <!-- Search + Filters -->
    <div class="reveal" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:24px;margin-bottom:40px">
      <div class="blog-filters" style="margin-bottom:0">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="edicao">Edição</button>
        <button class="filter-btn" data-filter="estrategia">Estratégia</button>
        <button class="filter-btn" data-filter="storytelling">Storytelling</button>
        <button class="filter-btn" data-filter="marketing">Marketing</button>
        <button class="filter-btn" data-filter="ia">IA</button>
      </div>
      <div class="blog-search">
        <svg class="blog-search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Buscar artigos..." id="blogSearch">
      </div>
    </div>

    <!-- Featured Article (preenchido dinamicamente com o post mais recente) -->
    <div id="blogFeatured"></div>

    <!-- Blog Grid (preenchido dinamicamente) -->
    <div class="blog-grid" id="blogGrid">
      <p class="body-sm">Carregando publicações...</p>
    </div>

  </div>
</section>

<!-- ── NEWSLETTER ─────────────────────────────────────────────── -->
<section class="section-sm bg-gray">
  <div class="container">
    <div class="card reveal" style="max-width:600px;margin:0 auto;text-align:center;padding:48px">
      <span style="font-size:2.5rem;display:block;margin-bottom:16px">📧</span>
      <h2 class="heading-lg" style="margin-bottom:12px">Receba conteúdo exclusivo</h2>
      <p class="body-md" style="margin-bottom:28px">Artigos, dicas e estratégias de edição de vídeo direto no seu e-mail. Sem spam.</p>
      <div style="display:flex;gap:12px;max-width:400px;margin:0 auto">
        <input type="email" class="form-input" placeholder="seu@email.com" style="flex:1">
        <button class="btn btn-primary">Assinar</button>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/components.js"></script>
<script>
  renderNavbar('blog.html');
  renderFooter();
  initReveal();

  const CATEGORIA_LABEL = {
    edicao: { badge: 'badge-purple', nome: 'Edição' },
    estrategia: { badge: 'badge-blue', nome: 'Estratégia' },
    storytelling: { badge: 'badge-purple', nome: 'Storytelling' },
    marketing: { badge: 'badge-blue', nome: 'Marketing' },
    ia: { badge: 'badge-blue', nome: 'IA' },
  };

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function tempoLeitura(texto) {
    const palavras = (texto || '').trim().split(/\s+/).length;
    return Math.max(1, Math.round(palavras / 200)) + ' min';
  }

  function safeImageUrl(value) {
    if (!value) return '';
    try {
      const url = new URL(value);
      return ['https:', 'http:'].includes(url.protocol) ? url.href : '';
    } catch {
      return '';
    }
  }

  function renderFeatured(post) {
    const el = document.getElementById('blogFeatured');
    if (!post) { el.innerHTML = ''; return; }
    const cat = CATEGORIA_LABEL[post.categoria?.slug] || { badge: 'badge-gray', nome: post.categoria?.nome || '' };
    const imageUrl = safeImageUrl(post.imagem_url);

    el.innerHTML = `
      <div class="card reveal" style="display:grid;grid-template-columns:1fr 1fr;gap:0;overflow:hidden;padding:0;margin-bottom:48px">
        <div style="background:${imageUrl ? `url(&quot;${imageUrl}&quot;) center/cover` : 'linear-gradient(135deg,#EDE9FE,#DBEAFE)'};display:flex;align-items:center;justify-content:center;font-size:5rem;padding:48px;min-height:280px">${imageUrl ? '' : '🎬'}</div>
        <div style="padding:40px">
          <div style="display:flex;gap:12px;margin-bottom:16px">
            <span class="badge badge-purple">Destaque</span>
            <span class="badge ${cat.badge}">${escapeHtml(cat.nome)}</span>
            <span class="body-sm" style="display:flex;align-items:center">${tempoLeitura(post.conteudo)} de leitura</span>
          </div>
          <h2 class="heading-lg" style="margin-bottom:12px">${escapeHtml(post.titulo)}</h2>
          <p class="body-md" style="margin-bottom:24px">${escapeHtml(post.resumo)}</p>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="body-sm">${new Date(post.created_at).toLocaleDateString('pt-BR')}</div>
            <a href="#" class="btn btn-primary btn-sm">Ler artigo</a>
          </div>
        </div>
      </div>
    `;
  }

  function renderGrid(posts) {
    const el = document.getElementById('blogGrid');
    if (!posts.length) {
      el.innerHTML = '<p class="body-sm">Nenhuma publicação ainda. Volte em breve!</p>';
      return;
    }

    el.innerHTML = posts.map(post => {
      const cat = CATEGORIA_LABEL[post.categoria?.slug] || { badge: 'badge-gray', nome: post.categoria?.nome || '' };
      const imageUrl = safeImageUrl(post.imagem_url);
      return `
        <div class="blog-card" data-category="${escapeHtml(post.categoria?.slug || '')}">
          <div class="blog-thumb" style="${imageUrl ? `background:url(&quot;${imageUrl}&quot;) center/cover` : 'background:linear-gradient(135deg,#DBEAFE,#EDE9FE)'}">${imageUrl ? '' : '📝'}</div>
          <div class="blog-body">
            <div class="blog-meta">
              <span class="badge ${cat.badge}">${escapeHtml(cat.nome)}</span>
              <span class="body-sm">${tempoLeitura(post.conteudo)}</span>
            </div>
            <h3>${escapeHtml(post.titulo)}</h3>
            <p class="body-sm">${escapeHtml(post.resumo)}</p>
            <a href="#" class="blog-read-more">Ler artigo <span>→</span></a>
          </div>
        </div>
      `;
    }).join('');
  }

  async function carregarBlog() {
    const { data, error } = await supabaseClient
      .from('publicacoes')
      .select('*, categoria:categorias!publicacoes_categoria_id_fkey(id, nome, slug)')
      .eq('publicado', true)
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('blogGrid').innerHTML = '<p class="body-sm">Não foi possível carregar as publicações agora.</p>';
      console.error('[Blog] Erro ao buscar publicações:', error.message);
      return;
    }

    const posts = data || [];
    renderFeatured(posts[0]);
    renderGrid(posts.slice(1));
    initFilters('#blogGrid', '.blog-card', 'category');

    document.getElementById('blogSearch').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      document.querySelectorAll('.blog-card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(q) ? '' : 'none';
      });
    });
  }

  carregarBlog();
</script>
</body>
</html>
