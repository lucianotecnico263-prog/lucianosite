<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Luciano Júnior | Editor de Vídeo</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0A0A0A" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    /* ── Login Screen ── */
    #login-screen, #admin-panel { width: 100%; max-width: 480px; }

    .admin-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: 0 0 60px rgba(245,197,66,.08);
    }
    .admin-logo {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .admin-logo span { color: var(--gold); }
    .admin-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .875rem;
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,197,66,.1);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn-full { width: 100%; justify-content: center; margin-top: 4px; }

    /* ── Status messages ── */
    #login-error, #save-status {
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: .875rem;
      margin-top: 16px;
      display: none;
    }
    #login-error { background: rgba(255,80,80,.12); border: 1px solid rgba(255,80,80,.3); color: #ff8080; }
    #save-status.success { background: rgba(37,211,102,.12); border: 1px solid rgba(37,211,102,.3); color: #25D366; display: block; }
    #save-status.error   { background: rgba(255,80,80,.12); border: 1px solid rgba(255,80,80,.3); color: #ff8080; display: block; }

    /* ── Admin panel header ── */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .admin-header h2 { font-size: 1.2rem; font-weight: 700; }
    .live-badge {
      background: rgba(37,211,102,.15);
      border: 1px solid rgba(37,211,102,.3);
      color: #25D366;
      font-size: .75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #25D366;
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 24px 0;
    }
    .logout-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      margin-top: 20px;
      cursor: pointer;
    }
    .logout-link:hover { color: var(--gold); }

    /* ── Loading spinner inline ── */
    .btn-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(10,10,10,.3);
      border-top-color: #0A0A0A;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .loading .btn-spinner { display: block; }
    .loading .btn-text { display: none; }
  </style>
</head>
<body>

<!-- ── Tela de Login ─────────────────────────────────────── -->
<div id="login-screen">
  <div class="admin-card">
    <div class="admin-logo">Luciano <span>Admin</span></div>
    <p class="admin-subtitle">Painel de controle do site</p>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="admin-key">Chave de Acesso</label>
        <input
          type="password"
          id="admin-key"
          placeholder="Digite sua chave de acesso"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span class="btn-text">Entrar no Painel</span>
        <span class="btn-spinner"></span>
      </button>
      <div id="login-error" role="alert">Chave inválida. Tente novamente.</div>
    </form>
  </div>
</div>

<!-- ── Painel Admin ──────────────────────────────────────── -->
<div id="admin-panel" style="display:none; max-width:560px;">
  <div class="admin-card">
    <div class="admin-header">
      <h2>⚙️ Configurações do Site</h2>
      <span class="live-badge"><span class="live-dot"></span> Ao Vivo</span>
    </div>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:20px;">
      Alterações salvas aqui refletem <strong style="color:var(--text)">imediatamente</strong> no site para todos os visitantes.
    </p>

    <form id="settings-form" novalidate>
      <div class="form-group">
        <label for="f-price">Preço do Pacote de Teste</label>
        <input type="text" id="f-price" placeholder="Ex: R$29" />
      </div>
      <div class="form-group">
        <label for="f-whatsapp">Número WhatsApp (com DDI)</label>
        <input type="text" id="f-whatsapp" placeholder="Ex: +557581385296" />
      </div>
      <div class="form-group">
        <label for="f-hero-title">Título do Hero</label>
        <input type="text" id="f-hero-title" placeholder="Ex: Luciano Júnior | Editor de Vídeo" />
      </div>
      <div class="form-group">
        <label for="f-hero-sub">Subtítulo do Hero</label>
        <textarea id="f-hero-sub" placeholder="Ex: Teste meu trabalho por R$29 em 48h."></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="save-btn">
        <span class="btn-text">💾 Salvar Alterações</span>
        <span class="btn-spinner"></span>
      </button>
      <div id="save-status" role="alert"></div>
    </form>

    <hr class="divider" />
    <a class="logout-link" id="logout-btn">Sair do painel →</a>
  </div>
</div>

<script>
'use strict';

let adminKey = '';

/* ── Login ─────────────────────────────────────────────── */
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const key = document.getElementById('admin-key').value.trim();
  if (!key) return;

  const btn = document.getElementById('login-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch('/api/settings', {
      headers: { 'X-ADMIN-KEY': key, 'Accept': 'application/json' }
    });

    if (res.ok) {
      const data = await res.json();
      adminKey = key;
      showPanel(data);
    } else {
      showLoginError();
    }
  } catch {
    showLoginError('Erro de conexão. Verifique se o Worker está rodando.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg || 'Chave inválida. Tente novamente.';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

/* ── Painel ─────────────────────────────────────────────── */
function showPanel(data) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display  = 'block';

  document.getElementById('f-price').value      = data.price      || '';
  document.getElementById('f-whatsapp').value   = data.whatsapp   || '';
  document.getElementById('f-hero-title').value = data.hero_title || '';
  document.getElementById('f-hero-sub').value   = data.hero_sub   || '';
}

/* ── Salvar ─────────────────────────────────────────────── */
document.getElementById('settings-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const payload = {
    price:      document.getElementById('f-price').value.trim(),
    whatsapp:   document.getElementById('f-whatsapp').value.trim(),
    hero_title: document.getElementById('f-hero-title').value.trim(),
    hero_sub:   document.getElementById('f-hero-sub').value.trim()
  };

  const btn = document.getElementById('save-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  const statusEl = document.getElementById('save-status');
  statusEl.className = '';
  statusEl.style.display = 'none';

  try {
    const res = await fetch('/api/settings', {
      method:  'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-ADMIN-KEY':  adminKey
      },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      statusEl.textContent = '✅ Alterações salvas! O site já foi atualizado ao vivo.';
      statusEl.className   = 'success';
    } else {
      const err = await res.json().catch(() => ({}));
      statusEl.textContent = '❌ Erro ao salvar: ' + (err.error || res.status);
      statusEl.className   = 'error';
    }
  } catch {
    statusEl.textContent = '❌ Erro de conexão com o Worker.';
    statusEl.className   = 'error';
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    setTimeout(() => {
      statusEl.className = '';
      statusEl.style.display = 'none';
    }, 5000);
  }
});

/* ── Logout ─────────────────────────────────────────────── */
document.getElementById('logout-btn').addEventListener('click', () => {
  adminKey = '';
  document.getElementById('admin-key').value = '';
  document.getElementById('admin-panel').style.display  = 'none';
  document.getElementById('login-screen').style.display = 'block';
});
</script>
</body>
</html>
